name: Build Desktop App

# 触发条件：
#   - push 到 main / master 分支 → Mac + Windows 构建，自动发 prerelease（tag: v<version>-build.<run_number>）
#   - push v* 标签                → 同上，作为正式 release 发布
#   - pull_request / dispatch     → 只构建、上传 artifact，不发 Release
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # 一个平台挂了不要连带取消另一个平台
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_script: build:mac
            artifact_name: wechat-auto-mac
            artifact_path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - os: windows-latest
            platform: win
            build_script: build:win
            artifact_name: wechat-auto-windows
            artifact_path: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # nut-js 拉取 libuiohook 预编译包，走 GitHub 的镜像即可；若偶发超时，这里留个切换口
          ELECTRON_SKIP_BINARY_DOWNLOAD: 0

      - name: Build (${{ matrix.platform }})
        run: npm run ${{ matrix.build_script }}
        env:
          # CI 没有 Apple 签名证书 —— 关闭自动发现，避免 electron-builder 尝试调用 codesign
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # electron-builder 默认不发布；这里再显式关一次避免 publish:generic 占用网络
          ELECTRON_BUILDER_PUBLISH: never
          # GitHub 提供的 token，用于 electron-builder 可能的 release 上传（此处未开启，仅备用）
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Publish GitHub Release
    # PR 不发 Release；push 分支或 push tag 或手动触发都会发
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # 打了 v* 标签 → 正式 release，tag/name 直接用 tag 字面
            TAG="${GITHUB_REF#refs/tags/}"
            PRERELEASE=false
          else
            # 普通 push（main/master 或手动触发）→ 自动滚动 prerelease
            TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
            PRERELEASE=true
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "[release] tag=${TAG} prerelease=${PRERELEASE} version=${VERSION}"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag 与 release 名一致；tag 不存在时由 action 自动基于当前 commit 创建
          name: ${{ steps.meta.outputs.tag }}
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/latest-mac.yml
            artifacts/**/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
